services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DATABASE_DSN: postgres://ops:ops@postgres:5432/ops_release?sslmode=disable
      REDIS_ADDR: redis:6379
      INTEGRATION_MODE: mock
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ops_release
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
