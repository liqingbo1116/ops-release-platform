services:
  ops-agent:
    build:
      context: .
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${AGENT_HEALTH_PORT:-18080}:18080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
